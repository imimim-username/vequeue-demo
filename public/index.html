<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Governance Town — veQueue MMO</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#06000f;overflow:hidden;font-family:'Press Start 2P',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* Screens */
#screen-title,#screen-create,#screen-game{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
#screen-title.active,#screen-create.active,#screen-game.active{display:flex}

/* Character creation */
#create-box{background:rgba(4,4,24,0.97);border:3px solid #5566cc;border-radius:4px;padding:32px;width:min(520px,95vw);color:#dde8ff}
#create-box h2{font-size:10px;color:#ffee44;text-align:center;margin-bottom:24px;letter-spacing:2px}
.field{margin-bottom:20px}
.field label{display:block;font-size:7px;color:#8899cc;margin-bottom:8px;letter-spacing:1px}
.field input[type=text]{width:100%;background:#0a0a22;border:2px solid #334488;color:#dde8ff;font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 12px;outline:none;border-radius:2px}
.field input[type=text]:focus{border-color:#5577ff}
.colors{display:flex;gap:10px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:4px;cursor:pointer;border:3px solid transparent;transition:border-color .1s}
.color-swatch.sel{border-color:#ffffff}
#create-btn{width:100%;background:#1c2c72;border:2px solid #5566cc;color:#ffee44;font-family:'Press Start 2P',monospace;font-size:8px;padding:14px;cursor:pointer;margin-top:8px;letter-spacing:1px}
#create-btn:hover{background:#2a3a8a}
.persist-row{display:flex;align-items:center;gap:10px;margin-top:16px}
.persist-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#5577ff}
.persist-row label{font-size:6px;color:#6677aa;cursor:pointer}

/* HUD */
#hud{position:fixed;top:0;left:50%;transform:translateX(-50%);display:none;width:min(640px,100vw);z-index:20}
#hud.active{display:block}
#hud-bar{height:28px;background:rgba(4,4,24,0.95);border-bottom:2px solid #1a2a66;display:flex;align-items:center;justify-content:space-between;padding:0 10px;gap:8px}
#hud-zone{font-size:5px;color:#ffee44;letter-spacing:1px;flex:1}
#hud-tokens{font-size:6px;color:#ffdd44}
#hud-quests{font-size:5px;color:#44ff88}
#hud-online{font-size:5px;color:#6677aa}

/* Chat */
#chat{position:fixed;bottom:0;left:50%;transform:translateX(-50%);display:none;width:min(640px,100vw);z-index:20}
#chat.active{display:block}
#chat-log{height:88px;overflow-y:auto;padding:6px 10px;background:rgba(0,0,10,0.82);border-top:1px solid #1a2a44;font-size:6px;line-height:1.7}
#chat-log::-webkit-scrollbar{width:4px}
#chat-log::-webkit-scrollbar-track{background:transparent}
#chat-log::-webkit-scrollbar-thumb{background:#334}
#chat-input-row{display:flex;background:rgba(4,4,24,0.97);border-top:1px solid #2233aa;height:28px}
#chat-input{flex:1;background:transparent;border:none;color:#dde8ff;font-family:'Press Start 2P',monospace;font-size:7px;padding:0 10px;outline:none}
#chat-input::placeholder{color:#334466}
#chat-send{background:#1a2a66;border:none;border-left:1px solid #2233aa;color:#aabbff;font-size:11px;padding:0 12px;cursor:pointer}

/* Scoreboard */
#scoreboard{position:fixed;top:30px;right:calc(50% - 320px);display:none;z-index:25;background:rgba(4,4,24,0.97);border:2px solid #5566cc;padding:12px 16px;min-width:220px;max-width:280px}
#scoreboard.active{display:block}
#scoreboard h3{font-size:7px;color:#ffee44;margin-bottom:10px;letter-spacing:1px}
#sb-rows{font-size:6px;line-height:2.2}
.sb-row{display:flex;gap:8px;align-items:center}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-name{flex:1;color:#dde8ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-tok{color:#ffdd44;min-width:44px;text-align:right}
.sb-q{color:#44ff88;min-width:24px;text-align:right}

/* Quest panel */
#quest-panel{position:fixed;top:30px;left:calc(50% - 320px);display:none;z-index:25;background:rgba(4,4,24,0.97);border:2px solid #5566cc;padding:12px 16px;min-width:200px}
#quest-panel.active{display:block}
#quest-panel h3{font-size:7px;color:#ffee44;margin-bottom:10px;letter-spacing:1px}
.qrow{font-size:6px;line-height:2.2;color:#6677aa;display:flex;gap:6px;align-items:center}
.qrow.done{color:#44ff88}
.qrow.active{color:#ffffff}
.qchk{font-size:8px}

/* Completion overlay */
#completion{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,10,0.88)}
#completion.active{display:flex}
#comp-box{background:rgba(4,4,24,0.97);border:3px solid #c8a040;padding:32px;text-align:center;max-width:480px;width:90vw}
#comp-box h2{font-size:10px;color:#ffee44;margin-bottom:16px}
#comp-box p{font-size:6px;color:#dde8ff;line-height:2.2;margin-bottom:20px}
.comp-btn{display:inline-block;background:#1c2c72;border:2px solid #5566cc;color:#ffee44;font-family:'Press Start 2P',monospace;font-size:7px;padding:12px 20px;cursor:pointer;margin:6px;text-decoration:none}
.comp-btn:hover{background:#2a3a8a}
.comp-btn.discord{border-color:#7289da;color:#7289da}
.comp-btn.mint{border-color:#44ff88;color:#44ff88}

/* Mobile gamepad */
#gamepad{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(640px,100vw);height:140px;background:#08081a;border-top:2px solid #1a2a55;z-index:20;flex-direction:row;align-items:center;justify-content:space-between;padding:8px 20px}
body.touch #gamepad{display:flex}
body.touch #chat{bottom:140px}
#dpad{position:relative;width:108px;height:108px}
.dp{position:absolute;width:34px;height:34px;background:#111830;border:2px solid #2a3a88;border-radius:4px;color:#6688cc;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dp:active,.dp.on{background:#1e3aaa;border-color:#5577ee;color:#fff}
#dp-u{top:0;left:37px}#dp-l{top:37px;left:0}#dp-r{top:37px;left:74px}#dp-d{top:74px;left:37px}
#dp-c{top:37px;left:37px;background:#0a1020;border-color:#141e44;cursor:default;pointer-events:none}
#abtns{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.abtn{border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;border:3px solid;font-family:'Press Start 2P',monospace}
#btn-a{width:58px;height:58px;background:#5a1440;border-color:#bb3388;font-size:10px}
#btn-a:active,#btn-a.on{background:#993366;border-color:#ff66bb}
#btn-b{width:42px;height:42px;background:#182240;border-color:#2e4a99;font-size:8px}
#btn-b:active,#btn-b.on{background:#2255aa;border-color:#5588ff}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="screen-title" class="active">
  <canvas id="c-title" width="640" height="416"></canvas>
</div>

<!-- CHARACTER CREATION -->
<div id="screen-create">
  <div id="create-box">
    <h2>CREATE YOUR CHARACTER</h2>
    <div class="field">
      <label>NICKNAME</label>
      <input type="text" id="nick-input" maxlength="16" placeholder="Enter name...">
    </div>
    <div class="field">
      <label>ARMOR COLOR</label>
      <div class="colors" id="color-picker"></div>
    </div>
    <div class="persist-row">
      <input type="checkbox" id="persist-cb" checked>
      <label for="persist-cb">Remember me (saves progress in this browser)</label>
    </div>
    <div class="persist-row" style="margin-top:6px">
      <input type="checkbox" id="persist-no" id="persist-no">
      <label for="persist-no">Play without saving (progress resets on close)</label>
    </div>
    <button id="create-btn">ENTER GOVERNANCE TOWN ▶</button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game">
  <div id="wrap">
    <canvas id="c" width="640" height="416"></canvas>
    <div id="gamepad">
      <div id="dpad">
        <div class="dp" id="dp-u">▲</div><div class="dp" id="dp-l">◀</div>
        <div class="dp" id="dp-c"></div><div class="dp" id="dp-r">▶</div>
        <div class="dp" id="dp-d">▼</div>
      </div>
      <div id="abtns">
        <div class="abtn" id="btn-a">ACT</div>
        <div class="abtn" id="btn-b">ESC</div>
      </div>
    </div>
  </div>
</div>

<!-- HUD (over game) -->
<div id="hud">
  <div id="hud-bar">
    <span id="hud-zone">GOVERNANCE TOWN</span>
    <span id="hud-tokens">⬡ 1000 GOV</span>
    <span id="hud-quests">0/5 QUESTS</span>
    <span id="hud-online">1 online</span>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="chat-log"></div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" maxlength="120" placeholder="Press T to chat, Enter to send...">
    <button id="chat-send">➤</button>
  </div>
</div>

<!-- Scoreboard (TAB) -->
<div id="scoreboard">
  <h3>LEADERBOARD</h3>
  <div id="sb-rows"></div>
</div>

<!-- Quest panel (Q) -->
<div id="quest-panel">
  <h3>QUESTS</h3>
  <div id="quest-rows"></div>
</div>

<!-- Completion -->
<div id="completion">
  <div id="comp-box">
    <h2>🎓 GOVERNANCE GRADUATE</h2>
    <p>You have completed all five quests<br>and learned how veQueue works.<br><br>Claim your reward:</p>
    <a class="comp-btn discord" href="#" id="comp-discord" target="_blank">GET DISCORD ROLE<br><span style="font-size:5px;color:#666">(coming soon)</span></a>
    <a class="comp-btn mint" href="#" id="comp-mint" target="_blank">FREE MINT ON BASE<br><span style="font-size:5px;color:#666">(coming soon)</span></a>
    <br>
    <button class="comp-btn" onclick="document.getElementById('completion').classList.remove('active')">KEEP EXPLORING</button>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//   GOVERNANCE TOWN — veQueue Multiplayer Demo
// ═══════════════════════════════════════════════════════════

// ── Constants ────────────────────────────────────────────
const BW=640,BH=416,TS=32,VW=20,VH=13; // viewport tiles

// World tile types
const GR=0,RD=1,WL=2,TR=3,EN=4,SI=5,FN=6,WW=7,FL=8,CH=9,
      MA=10,WN=11,SF=12,SH=13,PL=14,VD=15,RG=16,CO=17,CF=18;
const SOLID_TOWN=new Set([WL,TR,FN,SI]);
const SOLID_BLDG=new Set([WL,WA_B=2,CH,MA,WN,SF,SH,PL,VD,CO,CF]);

const PLAYER_COLORS=['#2244cc','#cc2222','#228822','#9922cc','#cc8822','#226688'];
const COLOR_NAMES  =['Blue','Red','Green','Purple','Orange','Teal'];

// Quest definitions
const QUESTS=[
  {id:'q1',label:'Talk to the Town Crier',     zone:'town'},
  {id:'q2',label:'Complete Entry Intake',       zone:'governance'},
  {id:'q3',label:'Observe Yield in the Vault',  zone:'governance'},
  {id:'q4',label:'Learn Principal Protection',  zone:'governance'},
  {id:'q5',label:'Study the Exit Queue',        zone:'governance'},
];

// ── World Map (40×28 tiles) ───────────────────────────────
const WW_=WW; // alias to avoid conflict
// 0=GR 1=RD 2=WL 3=TR 4=EN 5=SI 6=FN 7=WW_ 8=FL
const TOWN_W=40,TOWN_H=28;
function makeTownMap(){
  const m=[];
  for(let y=0;y<TOWN_H;y++){m[y]=[];for(let x=0;x<TOWN_W;x++)m[y][x]=GR;}

  // Border trees
  for(let x=0;x<TOWN_W;x++){m[0][x]=TR;m[TOWN_H-1][x]=TR;}
  for(let y=0;y<TOWN_H;y++){m[y][0]=TR;m[y][TOWN_W-1]=TR;}

  // Main horizontal road: rows 11-12
  for(let x=1;x<TOWN_W-1;x++){m[11][x]=RD;m[12][x]=RD;}
  // Main vertical road: cols 18-19
  for(let y=1;y<TOWN_H-1;y++){m[y][18]=RD;m[y][19]=RD;}

  // ── TAVERN (top-left): rows 2-10, cols 2-13 ──
  buildingBox(m,2,2,12,9);
  // door at col 7, row 10 (south face)
  m[10][7]=EN;m[10][8]=EN;
  // path to road
  for(let y=10;y<=11;y++){m[y][7]=RD;m[y][8]=RD;}

  // ── MARKETPLACE (top-right): rows 2-10, cols 25-37 ──
  buildingBox(m,25,2,13,9);
  m[10][31]=EN;m[10][32]=EN;
  for(let y=10;y<=11;y++){m[y][31]=RD;m[y][32]=RD;}

  // ── GOVERNANCE HALL (bottom-left): rows 15-26, cols 2-16 ──
  buildingBox(m,2,15,15,12);
  m[15][8]=EN;m[15][9]=EN;
  for(let y=12;y<=15;y++){m[y][8]=RD;m[y][9]=RD;}

  // ── TREASURY (bottom-right): rows 15-26, cols 23-37 ──
  buildingBox(m,23,15,15,12);
  m[15][30]=EN;m[15][31]=EN;
  for(let y=12;y<=15;y++){m[y][30]=RD;m[y][31]=RD;}

  // Town square paving (around intersection)
  for(let y=10;y<=13;y++)for(let x=14;x<=23;x++)if(m[y][x]===GR)m[y][x]=RD;

  // Fountain at center square col 20 row 11
  m[11][20]=WW_;m[11][21]=WW_;m[12][20]=WW_;m[12][21]=WW_;

  // Notice board / town crier
  m[10][16]=SI;  // notice board
  m[10][23]=SI;  // second sign

  // Decorative trees in corners
  [[4,4],[4,5],[5,4],[6,4],[14,3],[15,3],[14,4],
   [26,4],[27,3],[36,4],[36,5],[35,4],
   [4,19],[4,20],[5,19],[4,24],[4,25],
   [26,19],[27,20],[36,19],[36,24],[35,25]].forEach(([x,y])=>{
    if(m[y][x]===GR)m[y][x]=TR;
  });

  // Fence lines near buildings
  for(let x=14;x<=16;x++)m[10][x]=FN;
  for(let x=22;x<=24;x++)m[10][x]=FN;

  return m;
}
function buildingBox(m,bx,by,bw,bh){
  for(let dy=0;dy<bh;dy++)for(let dx=0;dx<bw;dx++){
    const tx=bx+dx,ty=by+dy;
    if(ty<TOWN_H&&tx<TOWN_W) m[ty][tx]=(dy===0||dy===bh-1||dx===0||dx===bw-1)?WL:FL;
  }
}

const TOWN_MAP=makeTownMap();

// Building labels for entrances
const BLDG_LABELS=[
  {x:7,  y:9,  w:3, label:'TAVERN',           zone:'tavern'},
  {x:30, y:9,  w:3, label:'MARKETPLACE',       zone:'marketplace'},
  {x:8,  y:16, w:3, label:'GOVERNANCE HALL',   zone:'governance'},
  {x:30, y:16, w:3, label:'TREASURY',          zone:'treasury'},
];

  treasury:    [{tx:30,ty:15},{tx:31,ty:15}],

const BLDG_MAPS={

      [WL,CH,CH,FL,CH,CH,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,CH,CH,FL,CH,CH,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,MA,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,WL,WL,WL,WL,WL,WL,WL,WL,EN,EN,WL,WL,WL,WL,WL,WL,WL,WL,WL],
    ],
    npcs:[
      {id:'intake',x:10,y:1,sprite:'clerk',  dialog:['__INTAKE_WINDOW__']},
      {id:'vk',    x:10,y:9,sprite:'gov',    dialog:[
        "THE VAULT — tokens at work.",
        "Your GOV tokens generate yield\nwhen locked here. Watch the\naccrual counter above.",
        "ERC-4626 standard vault.\nSwappable by governance vote.\nNo silent migrations.",
      ]},
      {id:'assr',  x:7, y:9,sprite:'gov',    dialog:[
        "WATERMARK OFFICE.\nPrincipal Protection Division.",
        "The WATERMARK tracks total\nshares issued per asset.\nDAO can only extract SURPLUS\nabove this line.",
        "PROFITABLE: assets > watermark\n→ surplus = DAO revenue.\nUNDERWATER: losses shared\npro-rata. Equal pain.",

      {id:'exitc', x:10,y:1,sprite:'clerk2', dialog:[

      {id:'w1',x:1,y:5,sprite:'citizen', dialog:["Been in queue since epoch 42.\nThe wait IS the security."]},

    machine:{x:16,y:6,startServing:38,playerNum:42,tickFrames:110},
    doors:[{x:9,y:12,to:'town',sx:8,sy:16},{x:10,y:12,to:'town',sx:9,sy:16}],

  tavern:{
    label:'THE TAVERN',
    floor:'carpet',
    spawnX:7,spawnY:10,
    map:[
      [WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],

      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,SH,SH,SH,SH,SH,SH,SH,SH,SH,SH,SH,SH,SH,SH,SH,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,CH,FL,CH,FL,CH,FL,FL,FL,FL,FL,CH,FL,CH,FL,CH,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],
      [WL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,FL,WL],

    npcs:[
      {id:'barkeep',x:10,y:5,sprite:'gov',facing:'down',dialog:[
        "WELCOME TO THE TAVERN.\nI'm the barkeep.",
        "This is where adventurers\ngather before heading to\nGovernance Hall.",
        "The veQueue protocol lets you\nlock governance tokens with\nPRINCIPAL PROTECTION.\nYour tokens can't be stolen.",
        "Head to GOVERNANCE HALL\n(south road) to begin\nyour intake process.",
      ]},
      {id:'patron1',x:2,y:7,sprite:'citizen', dialog:["Already did my intake.\nvqShares are great."]},

// Mobile touch
function setupTouch(){
  const map={'dp-u':'up','dp-l':'left','dp-r':'right','dp-d':'down','btn-a':'act','btn-b':'esc'};
  Object.entries(map).forEach(([id,k])=>{
    const el=document.getElementById(id);if(!el)return;
    const on=e=>{e.preventDefault();held[k]=true;el.classList.add('on');};
    const off=e=>{e.preventDefault();held[k]=false;el.classList.remove('on');};
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
  });
  C.addEventListener('touchstart',e=>{e.preventDefault();if(dlg)advanceDlg();},{passive:false});
}

function appendChat(msg){
  const div=document.createElement('div');

  chatLog.scrollTop=chatLog.scrollHeight;
  while(chatLog.children.length>80)chatLog.removeChild(chatLog.firstChild);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function currentMap(){
  if(myZone==='town')return{map:TOWN_MAP,w:TOWN_W,h:TOWN_H,solidSet:SOLID_TOWN,bldg:false};
  const b=BLDG_MAPS[myZone];
  return{map:b.map,w:20,h:13,solidSet:SOLID_BLDG,bldg:true};
}
function tileAt(x,y){
  const{map,w,h}=currentMap();
  if(x<0||x>=w||y<0||y>=h)return WL;
  return map[y][x];
}
function isPassable(x,y){
  const{solidSet}=currentMap();
  if(solidSet.has(tileAt(x,y)))return false;
  if(myZone!=='town'){
    const npcs=(BLDG_MAPS[myZone]?.npcs||[]);
    if(npcs.some(n=>n.x===x&&n.y===y))return false;
  }
  return true;
}
function adjDir(){return{up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[myDir]||[0,0];}
function adjNpc(){
  if(myZone==='town'){
    // Town crier
    const [dx,dy]=adjDir();
    if(myX+dx===TOWN_CRIER.x&&myY+dy===TOWN_CRIER.y)return{id:'crier',dialog:[
      "HEAR YE! HEAR YE!\nWelcome to Governance Town!",
      "The veQueue protocol allows\nyou to lock governance tokens\nwith PRINCIPAL PROTECTION.\nYour stake can't be stolen.",
      "Visit the TAVERN for\nan introduction, or head\nstraight to GOVERNANCE HALL\nto begin your intake.",
      "Complete all five quests\nto earn your\nGOVERNANCE GRADUATE badge!",
    ]};
    return null;
  }
  const [dx,dy]=adjDir();
  const npcs=BLDG_MAPS[myZone]?.npcs||[];
  return npcs.find(n=>n.x===myX+dx&&n.y===myY+dy)||null;
}
function adjMachine(){
  if(myZone!=='governance')return null;
  const [dx,dy]=adjDir();
  const m=BLDG_MAPS.governance.machine;
  return m&&m.x===myX+dx&&m.y===myY+dy?m:null;
}
function adjWindow(){
  if(myZone!=='governance')return false;
  const [dx,dy]=adjDir();
  return tileAt(myX+dx,myY+dy)===WN;
}

function handleIntakeWindow(){
  const q=queue;
  if(!q.hasNumber){
    openDlg(["WINDOW 1 — INTAKE\n\nPlease take a number\nfrom the dispenser\non the right side first."]);
  } else if(!q.called){
    openDlg(["WINDOW 1 — INTAKE\n\nNow serving:  #"+String(q.serving).padStart(3,'0')+"\nYour number:  #"+q.playerNum+"\n\nPlease wait until your\nnumber is called."]);
  } else if(!q.processed){
    openDlg([
      "WINDOW 1 — INTAKE\n\nWelcome! Processing your\nentry request now.",
      "To lock governance tokens,\nyou join a RATE-LIMITED queue.\nOnly a fixed % enters\neach epoch. No front-running.",
      "You receive vqSHARES —\nyour governance stake,\nas an ERC-6909 NFT.\nFully transferable.",
      "Tokens earn yield in\nTHE VAULT while locked.\nYour principal is protected\nby the WATERMARK.",
      "Exit is also rate-limited —\nsymmetric with entry.\nPrevents bank-runs.\nSafe vault deployment.",
      "Processing complete!\n\nAll departments are\nnow open to you.\nExplore freely.",
    ],()=>{
      q.processed=true;gProcessed.done=true;unlockMsg=300;
      doneQuest('q2');
      if(ME)ME.tokens=Math.max(0,(ME.tokens||1000)-100);
      socket.emit('quest_update',{questId:'q2',status:'done',tokens:ME?.tokens});
      saveLocal();
    });
  } else {
    openDlg(["Intake complete.\n\nAll departments open.\nYour locked amount: 100 GOV\nYield accruing in vault."]);
    doneQuest('q3'); // Visiting vault area counts
  }
}

let usePersist=true;

function saveLocal(){
  if(!usePersist||!ME)return;
  localStorage.setItem('gt_state',JSON.stringify({tokens:ME.tokens,quests:ME.quests,nickname:ME.nickname,color:ME.color}));
}
function loadLocal(){
  try{const s=localStorage.getItem('gt_state');return s?JSON.parse(s):null;}catch{return null;}
}

// ── UPDATE ────────────────────────────────────────────────
function update(){
  tick++;if(tick%5===0)animTick++;
  if(unlockMsg>0)unlockMsg--;
  if(ME?.chatTimer>0)ME.chatTimer--;
  Object.values(others).forEach(p=>{if(p.chatTimer>0)p.chatTimer--;});

  if(!ME)return;
  if(dlg){
    dlg.charProg=Math.min(dlg.charProg+1.6,dlg.pages[dlg.page].length);
    if(just('act'))advanceDlg();
    if(just('esc'))dlg=null;
    prev={...held};return;
  }

  // Queue tick
  const q=queue;
  if(myZone==='governance'&&q.hasNumber&&!q.called){
    q.timer++;
    q.serving=Math.min(38+Math.floor(q.timer/q.tickFrames),q.playerNum);
    if(q.serving>=q.playerNum){
      q.called=true;
      openDlg(["\uD83D\uDD14  NOW SERVING: #"+q.playerNum,
        "Please proceed to\nWINDOW 1 at the north counter.",
        "Walk up and press ACT\nto speak with the clerk."]);
    }
  }

  // Movement
  if(moving){
    mTimer++;
    const t=mTimer/mDur;
    const STEP=myZone==='town'?TS:TS;
    const cx=mSx+mDx*STEP*t,cy=mSy+mDy*STEP*t;
    myX=Math.round(cx/STEP);myY=Math.round(cy/STEP);
    if(mTimer>=mDur){
      myX=mSx/STEP+mDx;myY=mSy/STEP+mDy;
      moving=false;myFrame=(myFrame+1)%4;
      // Check zone entrance (town only)
      if(myZone==='town'){
        for(const [zone,tiles] of Object.entries(ZONE_ENTRANCES)){
          if(tiles.some(t=>t.tx===myX&&t.ty===myY)){
            const b=BLDG_MAPS[zone];
            changeZone(zone,b.spawnX,b.spawnY);
            return;
          }
        }
      } else {
        // Check building exit (EN tile)
        if(tileAt(myX,myY)===EN){
          const doors=BLDG_MAPS[myZone]?.doors||[];
          const door=doors.find(d=>d.x===myX&&d.y===myY);
          if(door){changeZone(door.to,door.sx,door.sy);return;}
        }
      }
      socket.emit('move',{x:myX,y:myY,dir:myDir});
    }
  } else {
    let dx=0,dy=0;
    if(held.up){dy=-1;myDir='up';}
    else if(held.down){dy=1;myDir='down';}
    else if(held.left){dx=-1;myDir='left';}
    else if(held.right){dx=1;myDir='right';}
    if((dx||dy)&&isPassable(myX+dx,myY+dy)){
      moving=true;mTimer=0;mSx=myX*TS;mSy=myY*TS;mDx=dx;mDy=dy;
    }
    if(just('act')){
      const npc=adjNpc();
      if(npc){
        if(npc.dialog[0]==='__INTAKE_WINDOW__'){handleIntakeWindow();}
        else{openDlg(npc.dialog,()=>{
          // Quest triggers
          if(npc.id==='crier'&&!questDone('q1'))doneQuest('q1');
          if((npc.id==='vk')&&!questDone('q3')){doneQuest('q3');}
          if((npc.id==='assr')&&!questDone('q4')){doneQuest('q4');}
          if((npc.id==='exitc')&&!questDone('q5')){doneQuest('q5');}
        });}
      } else if(adjWindow()){
        handleIntakeWindow();
      } else {
        const m=adjMachine();
        if(m){
          if(!q.hasNumber){
            q.hasNumber=true;q.serving=38;q.timer=0;q.called=false;
            openDlg(["\uD83C\uDFAB  TAKE A NUMBER\n\nYour number: #"+m.playerNum+"\nNow serving:  #"+m.startServing,
              "Wait until your number is\ncalled, then walk to\nWINDOW 1 at the north counter.",]);
          } else if(!q.called){
            openDlg(["Already in queue.\nNow serving: #"+q.serving+"\nYour number: #"+q.playerNum]);
          } else {
            openDlg(["Number called!\nGo to WINDOW 1 at\nthe north counter."]);
          }
        }
      }
    }
  }
  // Update camera (town only)
  if(myZone==='town'){
    const twX=myX*TS,twY=myY*TS;
    const targetCX=twX-(VW/2*TS)+TS/2,targetCY=twY-(VH/2*TS)+TS/2;
    camX+=(targetCX-camX)*0.15;camY+=(targetCY-camY)*0.15;
    camX=Math.max(0,Math.min(camX,(TOWN_W-VW)*TS));
    camY=Math.max(0,Math.min(camY,(TOWN_H-VH)*TS));
  } else {
    camX=0;camY=0;
  }
  prev={...held};
}

// ── TILE DRAWING ──────────────────────────────────────────
function drawTownTile(t,x,y){
  const bx=x*TS-Math.round(camX),by=y*TS-Math.round(camY);
  if(bx<-TS||bx>BW||by<-TS||by>BH)return;
  const ck=(x+y)%2===0;
  switch(t){
    case GR:
      r(bx,by,TS,TS,ck?'#2a4a1a':'#243d15');
      if((x*3+y*2)%7===0)r(bx+6,by+8,4,2,'#1e3410');
      if((x*5+y*3)%11===0)r(bx+20,by+18,3,3,'#1e3410');
      break;
    case RD:
      r(bx,by,TS,TS,ck?'#a08060':'#987850');
      ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(bx,by,TS,1);ctx.fillRect(bx,by,1,TS);
      break;
    case WL:
      r(bx,by,TS,TS,'#c4baa0');
      r(bx,by+Math.floor(TS*0.55),TS,TS-Math.floor(TS*0.55),'#7a6040');
      r(bx,by+Math.floor(TS*0.55)-2,TS,4,'#c8a040');
      r(bx,by,TS,2,'rgba(255,255,255,0.14)');
      break;
    case TR:
      r(bx,by,TS,TS,ck?'#2a4a1a':'#243d15');
      r(bx+10,by+18,12,14,'#5a3010');r(bx+12,by+16,8,4,'#4a2808');
      r(bx+8,by+4,16,16,'#1a5a10');r(bx+5,by+8,22,12,'#228818');
      r(bx+10,by+2,12,10,'#2a7018');r(bx+7,by+6,6,8,'rgba(255,255,255,0.07)');
      break;
    case EN:

// ── PLAYER SPRITE ─────────────────────────────────────────
const PS=2;
function pp(lx,ly,ox,oy,c){ctx.fillStyle=c;ctx.fillRect(ox+lx*PS,oy+ly*PS,PS,PS);}
function ppT(lx,ly,ox,oy,c){ctx_t.fillStyle=c;ctx_t.fillRect(ox+lx*PS,oy+ly*PS,PS,PS);}

function drawPlayerSprite(context,ox,oy,dir,color,frame,isMoving){
  const pxFn=(lx,ly,c)=>{context.fillStyle=c;context.fillRect(ox+lx*PS,oy+ly*PS,PS,PS);};
  const H=color,Hi=lighten(color,0.3),Bd=darken(color,0.3),
        Sk='#f0c880',B=color,Bh=Hi,
        L=darken(color,0.2),D='#111133',Ga='#aaaacc',Gb='#6666aa';
  const lo=isMoving?[0,3,0,-3][frame%4]:0,ao=isMoving?[2,-2,2,-2][frame%4]:0;
  context.fillStyle='rgba(0,0,0,0.22)';
  context.beginPath();context.ellipse(ox+12,oy+32,10,3,0,0,Math.PI*2);context.fill();
  if(dir==='up'){
    for(let lx=1;lx<11;lx++)pxFn(lx,0,H);for(let lx=0;lx<12;lx++)pxFn(lx,1,H);
    for(let lx=0;lx<12;lx++)pxFn(lx,2,lx===0||lx===11?H:Hi);
    for(let lx=0;lx<12;lx++){pxFn(lx,3,H);pxFn(lx,4,H);}
    for(let lx=2;lx<10;lx++)pxFn(lx,5,H);for(let lx=3;lx<9;lx++)pxFn(lx,6,'#c8a060');
    for(let ly=7;ly<12;ly++)for(let lx=1;lx<11;lx++)pxFn(lx,ly,ly===7||ly===11?Bd:B);
  } else {
    for(let lx=1;lx<11;lx++)pxFn(lx,0,H);for(let lx=0;lx<12;lx++)pxFn(lx,1,H);
    for(let lx=1;lx<11;lx++)pxFn(lx,2,'#080e38');pxFn(0,2,H);pxFn(11,2,H);
    for(let lx=1;lx<11;lx++)pxFn(lx,3,'#080e38');pxFn(0,3,H);pxFn(11,3,H);
    pxFn(2,2,'#1f30aa');pxFn(3,2,'#1f30aa');
    for(let lx=0;lx<12;lx++)pxFn(lx,4,H);
    for(let lx=2;lx<10;lx++){pxFn(lx,5,Sk);pxFn(lx,6,Sk);}
    const ex=dir==='left'?-1:dir==='right'?1:0;
    pxFn(3+ex,5,'#222244');pxFn(4+ex,5,'#222244');pxFn(7+ex,5,'#222244');pxFn(8+ex,5,'#222244');
    pxFn(3+ex,5,'rgba(255,255,255,0.6)');pxFn(7+ex,5,'rgba(255,255,255,0.6)');
    for(let lx=4;lx<8;lx++)pxFn(lx,7,Sk);
    for(let ly=8;ly<13;ly++)for(let lx=1;lx<11;lx++)pxFn(lx,ly,ly===8?Bh:lx===1||lx===10?Bd:B);
    pxFn(5,9,Bh);pxFn(6,9,Bh);pxFn(5,10,Bh);pxFn(6,10,Bh);
    for(let ly=9;ly<13;ly++)pxFn(0,ly,B);for(let ly=9;ly<12;ly++)pxFn(11,ly,B);
    pxFn(11,12,Ga);pxFn(12,11,Ga);pxFn(12,12,Gb);pxFn(11,13,Ga);
    pxFn(0,12,Sk);pxFn(0,13,Sk);
  }
  for(let lx=1;lx<5;lx++){pxFn(lx,13,L+lo*0);pxFn(lx,14,L);}
  for(let lx=7;lx<11;lx++){pxFn(lx,13,L);pxFn(lx,14,L);}
  for(let lx=0;lx<6;lx++)pxFn(lx,15,D);for(let lx=6;lx<12;lx++)pxFn(lx,15,D);
  // walking offsets
  if(isMoving){
    const lof=lo,roof=-lo;
    context.clearRect(ox+1*PS,oy+13*PS,4*PS,3*PS);context.clearRect(ox+7*PS,oy+13*PS,4*PS,3*PS);
    context.clearRect(ox+0*PS,oy+15*PS,6*PS,PS);context.clearRect(ox+6*PS,oy+15*PS,6*PS,PS);
    for(let lx=1;lx<5;lx++){context.fillStyle=L;context.fillRect(ox+lx*PS,oy+(13)*PS+lof,PS,PS);context.fillRect(ox+lx*PS,oy+(14)*PS+lof,PS,PS);}
    for(let lx=7;lx<11;lx++){context.fillStyle=L;context.fillRect(ox+lx*PS,oy+(13)*PS+roof,PS,PS);context.fillRect(ox+lx*PS,oy+(14)*PS+roof,PS,PS);}
    for(let lx=0;lx<6;lx++){context.fillStyle=D;context.fillRect(ox+lx*PS,oy+15*PS+lof,PS,PS);}
    for(let lx=6;lx<12;lx++){context.fillStyle=D;context.fillRect(ox+lx*PS,oy+15*PS+roof,PS,PS);}
  }
}
function lighten(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,((n>>16)&0xff)+Math.round(amt*255));
  const g=Math.min(255,((n>>8)&0xff)+Math.round(amt*255));
  const b=Math.min(255,(n&0xff)+Math.round(amt*255));
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function darken(hex,amt){return lighten(hex,-amt);}

  if(myZone!=='town')return;
  BLDG_LABELS.forEach(lb=>{
    const cx=(lb.x+lb.w/2)*TS-Math.round(camX);
    const cy=lb.y*TS-Math.round(camY)-8;
    if(cx<-60||cx>BW+60)return;
    ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
    const tw=ctx.measureText(lb.label).width+10;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(cx-tw/2,cy-10,tw,13);
    ctx.strokeStyle='#c8a040';ctx.lineWidth=1;ctx.strokeRect(cx-tw/2,cy-10,tw,13);
    ctx.fillStyle='#ffdd44';ctx.fillText(lb.label,cx,cy);
  });
}

// ── UNLOCK MSG ────────────────────────────────────────────
function drawUnlockMsg(){
  if(!unlockMsg)return;
  const a=Math.min(1,unlockMsg/30);
  r(0,0,BW,42,`rgba(0,18,0,${(a*0.9).toFixed(2)})`);
  ctx.strokeStyle=`rgba(0,255,100,${a.toFixed(2)})`;ctx.lineWidth=2;ctx.strokeRect(0,0,BW,42);
  ctx.fillStyle=`rgba(0,255,100,${a.toFixed(2)})`;ctx.font='8px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('\u2713  ALL DEPARTMENTS UNLOCKED  \u2713',BW/2,26);
}

// ── SCANLINES ─────────────────────────────────────────────
function drawScanlines(){
  ctx.fillStyle='rgba(0,0,0,0.07)';for(let y=0;y<BH;y+=2)ctx.fillRect(0,y,BW,1);
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  r(0,0,BW,BH,'#06000f');
  if(myZone==='town'){
    // Draw town tiles in viewport
    const startX=Math.floor(camX/TS),startY=Math.floor(camY/TS);
    for(let ty=startY;ty<Math.min(startY+VH+2,TOWN_H);ty++)
      for(let tx=startX;tx<Math.min(startX+VW+2,TOWN_W);tx++)
        drawTownTile(TOWN_MAP[ty][tx],tx,ty);
    drawBldgLabels();
    // Town crier dot
    const crierX=TOWN_CRIER.x*TS-Math.round(camX);
    const crierY=TOWN_CRIER.y*TS-Math.round(camY);
    if(crierX>-32&&crierX<BW&&crierY>-32&&crierY<BH){
      ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(crierX+TS/2,crierY+30,11,3,0,0,Math.PI*2);ctx.fill();
      drawPlayerSprite(ctx,crierX+4,crierY,'down','#cc8822',animTick%4,animTick%60<30);
      ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
      const tw2=ctx.measureText('TOWN CRIER').width+8;
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(crierX+TS/2-tw2/2,crierY-14,tw2,11);
      ctx.fillStyle='#ffdd44';ctx.fillText('TOWN CRIER',crierX+TS/2,crierY-5);
    }
  } else {
    // Building interior
    const b=BLDG_MAPS[myZone];
    const ft=b.floor||'marble';
    for(let ty=0;ty<13;ty++)for(let tx=0;tx<20;tx++)drawBldgTile(b.map[ty][tx],tx,ty,ft);
    if(myZone==='governance'){
      if(queue.hasNumber)drawQueueHUD();
      // Vault FX if near vault area
      drawVaultFX();
    }
    (b.npcs||[]).forEach(n=>drawNPC(n));
  }
  drawOtherPlayers();
  drawSelf();
  drawUnlockMsg();
  drawDlg();
  drawScanlines();
}

// ── HUD + PANELS ──────────────────────────────────────────
function updateHUD(){
  if(!ME)return;
  const done=QUESTS.filter(q=>ME.quests[q.id]==='done').length;
  document.getElementById('hud-zone').textContent=myZone==='town'?'GOVERNANCE TOWN':(BLDG_MAPS[myZone]?.label||myZone.toUpperCase());
  document.getElementById('hud-tokens').textContent='\u2B21 '+(ME.tokens||0)+' GOV';
  document.getElementById('hud-quests').textContent=done+'/5 QUESTS';
  document.getElementById('hud-online').textContent=(1+Object.keys(others).length)+' online';
}
function renderQuestPanel(){
  const rows=document.getElementById('quest-rows');rows.innerHTML='';
  QUESTS.forEach(q=>{
    const done=ME?.quests[q.id]==='done';
    const div=document.createElement('div');div.className='qrow'+(done?' done':'');
    div.innerHTML=`<span class="qchk">${done?'✓':'○'}</span>${q.label}`;
    rows.appendChild(div);
  });
}
function renderSB(rows){
  const el=document.getElementById('sb-rows');el.innerHTML='';
  rows.slice(0,12).forEach(p=>{
    const d=document.createElement('div');d.className='sb-row';
    d.innerHTML=`<div class="sb-dot" style="background:${p.color}"></div><span class="sb-name">${esc(p.nickname)}</span><span class="sb-q">${p.questsDone}/5</span><span class="sb-tok">${p.tokens}</span>`;
    el.appendChild(d);
  });
}

// ── RESIZE ────────────────────────────────────────────────
function resize(){
  const isTch=document.body.classList.contains('touch');
  const gpH=isTch?140:0,hudH=28,chatH=116;
  const aw=window.innerWidth,ah=window.innerHeight-gpH-hudH-chatH;
  const sc=Math.min(aw/BW,ah/BH,2);
  C.style.width=(BW*sc)+'px';C.style.height=(BH*sc)+'px';
  Ct.style.width=(BW*sc)+'px';Ct.style.height=(BH*sc)+'px';
  ['hud','chat','gamepad'].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&id!=='gamepad')el.style.width=(BW*sc)+'px';
  });
}
window.addEventListener('resize',resize);

// ── TITLE SCREEN ──────────────────────────────────────────
let titleTick=0;
function drawTitleLoop(){
  if(!document.getElementById('screen-title').classList.contains('active')){return;}
  titleTick++;
  const ctx2=ctx_t;
  ctx2.fillStyle='#06000f';ctx2.fillRect(0,0,BW,BH);
  for(let i=0;i<60;i++){
    const sx=(i*137+i*i*7)%BW,sy=(i*93+i*i*3)%BH;
    const a=(0.3+0.7*Math.sin(titleTick*0.04+i*0.4)).toFixed(2);
    ctx2.fillStyle=`rgba(255,255,255,${a})`;ctx2.fillRect(sx,sy,i%4===0?2:1,i%4===0?2:1);
  }
  ctx2.fillStyle='rgba(4,4,24,0.94)';ctx2.fillRect(60,80,520,240);
  ctx2.strokeStyle='#4455cc';ctx2.lineWidth=3;ctx2.strokeRect(60,80,520,240);
  const gr=ctx2.createLinearGradient(60,80,580,80);
  gr.addColorStop(0,'#5a3800');gr.addColorStop(0.5,'#c89020');gr.addColorStop(1,'#5a3800');
  ctx2.fillStyle=gr;ctx2.fillRect(60,80,520,6);
  ctx2.textAlign='center';ctx2.shadowColor='#ff8800';ctx2.shadowBlur=14;
  ctx2.fillStyle='#ffee44';ctx2.font='20px "Press Start 2P"';
  ctx2.fillText('GOVERNANCE TOWN',320,140);
  ctx2.shadowBlur=0;
  ctx2.fillStyle='#8899cc';ctx2.font='7px "Press Start 2P"';
  ctx2.fillText('A veQueue Multiplayer Demo',320,170);
  ctx2.fillStyle='#666688';ctx2.font='6px "Press Start 2P"';
  ctx2.fillText('Explore · Learn · Earn Your Badge',320,192);
  ctx2.fillStyle='#c8a040';ctx2.fillText('Up to '+Object.keys(others).length+1+' players online',320,218);
  if(titleTick%60<38){ctx2.fillStyle='#ffffff';ctx2.font='7px "Press Start 2P"';ctx2.fillText('PRESS ANY KEY TO START',320,264);}
  requestAnimationFrame(drawTitleLoop);
}
window.addEventListener('keydown',()=>{
  if(document.getElementById('screen-title').classList.contains('active'))showCreateScreen();
},{once:false});
document.getElementById('screen-title').addEventListener('click',showCreateScreen);
document.getElementById('screen-title').addEventListener('touchstart',e=>{e.preventDefault();showCreateScreen();},{passive:false});

// ── CHARACTER CREATION ────────────────────────────────────
let selectedColor=PLAYER_COLORS[0];
function buildColorPicker(){
  const cp=document.getElementById('color-picker');
  PLAYER_COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-swatch'+(i===0?' sel':'');
    d.style.background=c;d.title=COLOR_NAMES[i];
    d.addEventListener('click',()=>{
      selectedColor=c;
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('sel'));
      d.classList.add('sel');
    });
    cp.appendChild(d);
  });
}
buildColorPicker();

function showCreateScreen(){
  if(!document.getElementById('screen-title').classList.contains('active'))return;
  document.getElementById('screen-title').classList.remove('active');
  document.getElementById('screen-create').classList.add('active');
  document.getElementById('nick-input').focus();
  // Handle both checkboxes as mutual
  document.getElementById('persist-cb').addEventListener('change',e=>{if(e.target.checked)document.getElementById('persist-no').checked=false;});
  document.getElementById('persist-no').addEventListener('change',e=>{if(e.target.checked)document.getElementById('persist-cb').checked=false;});
}

document.getElementById('create-btn').addEventListener('click',startGame);
document.getElementById('nick-input').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});

function startGame(){
  const nick=document.getElementById('nick-input').value.trim()||'Anon';
  usePersist=document.getElementById('persist-cb').checked;

  // Load saved state
  let saved=null;
  if(usePersist){saved=loadLocal();}

  ME={id:null,nickname:nick,color:selectedColor,tokens:saved?.tokens||1000,quests:saved?.quests||{},chatBubble:null,chatTimer:0};
  savedQ=saved?.quests||null;

  document.getElementById('screen-create').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('hud').classList.add('active');
  document.getElementById('chat').classList.add('active');
  resize();

  socket.emit('join',{nickname:nick,color:selectedColor,saved:{tokens:ME.tokens,quests:ME.quests}});
  updateHUD();renderQuestPanel();
  requestAnimationFrame(gameLoop);
}

// ── MAIN LOOP ─────────────────────────────────────────────
function gameLoop(){
  update();render();requestAnimationFrame(gameLoop);
}

// ── BOOT ──────────────────────────────────────────────────
resize();
document.getElementById('screen-title').classList.add('active');
drawTitleLoop();
</script>
</body>
</html>
