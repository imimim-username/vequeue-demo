# Drop this file in /etc/nginx/sites-available/vequeue
# then: ln -s /etc/nginx/sites-available/vequeue /etc/nginx/sites-enabled/vequeue
# then: certbot --nginx -d vequeue.imimim.info
# then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name vequeue.imimim.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vequeue.imimim.info;

    # SSL managed by Certbot
    # ssl_certificate     /etc/letsencrypt/live/vequeue.imimim.info/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vequeue.imimim.info/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (required for Socket.io)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;   # keep WS connections alive
    }
}
